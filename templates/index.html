<!DOCTYPE html>
<html>
<head>
    <title>Car Price Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <img src="{{ url_for('static', filename='logo.png') }}" class="logo">

    <h2>🚗 Car Price Predictor</h2>

    <p class="accuracy">Model Accuracy: {{ accuracy }}%</p>

    <form action="/predict" method="post">

        <select name="Car_Name">
            {% for car in car_names %}
                <option value="{{ car }}">{{ car }}</option>
            {% endfor %}
        </select>

        <input type="text" name="Year" placeholder="Year" required>
        <input type="text" name="Present_Price" placeholder="Present Price (Lakhs)" required>
        <input type="text" name="Kms_Driven" placeholder="Kms Driven" required>

        <select name="Fuel_Type">
            <option value="0">Petrol</option>
            <option value="1">Diesel</option>
            <option value="2">CNG</option>
        </select>

        <select name="Seller_Type">
            <option value="0">Dealer</option>
            <option value="1">Individual</option>
        </select>

        <select name="Transmission">
            <option value="0">Manual</option>
            <option value="1">Automatic</option>
        </select>

        <input type="text" name="Owner" placeholder="Number of Owners" required>

        <button type="submit">Predict Price</button>

    </form>

    <h3>{{ prediction_text }}</h3>

</div>

</body>
</html>
